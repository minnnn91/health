<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness 專業分析系統</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // 🌟 這裡填入妳的 EmailJS Public Key
            emailjs.init("妳的_Public_Key"); 
        })();
    </script>
    <style>
        :root {
            --milk-tea: #A68B77;
            --dark-cocoa: #5D4D42;
            --cream-bg: #F2E8DF;
            --pure-white: #FFFFFF;
            --soft-text: #6E5F55;
            --base-gold: #B89A6B;
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #F8F5F2;
            color: var(--dark-cocoa);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        .page-wrapper {
            width: 95%; max-width: 500px;
            margin: 40px 0;
            position: relative;
        }

        .card {
            background: var(--pure-white); padding: 40px 25px;
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            box-sizing: border-box;
            width: 100%;
        }

        .hidden { display: none; opacity: 0; }
        .fade-in { animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(10px); } }

        h2 { text-align: center; color: var(--milk-tea); letter-spacing: 2px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }
        label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 8px; }
        
        input {
            width: 100%; padding: 14px; border: 1.5px solid #EEE;
            border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--milk-tea); outline: none; }

        .checkbox-group {
            background: #FDFBF9; padding: 20px;
            border-radius: 20px; border: 1px solid #F2EDE9; margin-bottom: 30px;
        }

        .checkbox-item {
            display: flex; align-items: flex-start; margin-bottom: 15px;
            cursor: pointer; font-size: 14px; line-height: 1.5; color: var(--soft-text);
        }
        .checkbox-item input { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--milk-tea); }

        .btn-analyze {
            width: 100%; padding: 18px; background-color: var(--milk-tea);
            color: white; border: none; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-analyze:hover { background-color: var(--dark-cocoa); }

        /* 置頂基礎建議 */
        .base-card {
            background: #FAF3E0; padding: 20px;
            border-radius: 20px; margin-bottom: 25px;
            border: 1px solid var(--base-gold);
        }

        /* 加強型建議 */
        .report-card {
            background: var(--cream-bg); padding: 20px;
            border-radius: 20px; margin-bottom: 15px;
            border-left: 6px solid var(--milk-tea);
        }

        /* 信任墊片文字區 */
        .trust-box {
            background: #FAF9F8; padding: 20px; border-radius: 20px; 
            margin-top: 30px; border: 1px dashed #D9C5B2;
        }

        /* LINE 按鈕 */
        .btn-line {
            display: block; width: 100%; padding: 18px; 
            background-color: var(--dark-cocoa); 
            color: white; border-radius: 50px; font-weight: bold; 
            text-decoration: none; text-align: center; margin-top: 20px;
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        .btn-line:hover { opacity: 0.9; transform: scale(1.02); }

        .reset-link {
            display: block; text-align: center; margin-top: 20px;
            color: #BBB; font-size: 13px; text-decoration: underline; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div id="page-1" class="card fade-in">
        <h2>Wellness 分析系統</h2>
        
        <div class="input-group">
            <label>您的稱呼</label>
            <input type="text" id="user_name" placeholder="如何稱呼您">
        </div>

        <div class="input-group">
            <label>基本數據 (cm / kg)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="height" placeholder="身高">
                <input type="number" id="weight" placeholder="體重">
            </div>
        </div>

        <div class="input-group">
            <label>生活現狀 (可複選)</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="habit" value="1"> 經常疲勞，起床仍覺睡不飽</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="2"> 每日用 3C 超過 6 小時，眼乾澀</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="3"> 外食多，每日蔬菜攝取不足</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="4"> 容易糾結內耗，睡前大腦無法停止運作</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="5"> 排便頻率不固定或卡關</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="6"> 換季時容易皮膚癢、流鼻水敏感</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="7"> 經常腰痠背痛，關節有聲響</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="8"> 記憶力下降，反應變得遲鈍</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="9"> 偏好甜食重口味，體脂偏高</label>
                <label class="checkbox-item"><input type="checkbox" name="habit" value="10"> 希望氣色紅潤，改善暗沈感</label>
            </div>
        </div>

        <button class="btn-analyze" onclick="goToResult()">分析我的健康狀況</button>
    </div>

    <div id="page-2" class="card hidden">
        <h2 style="font-size: 22px;">您的專業評估報告</h2>
        <p id="bmi-res" style="text-align: center; font-weight: bold; margin-bottom: 25px;"></p>
        
        <div class="base-card">
            <h4 style="margin: 0 0 10px 0; color: var(--base-gold);">🛡️ 每日基礎防禦建議</h4>
            <p style="font-size: 14px; margin: 0; line-height: 1.6;">
                <b>必備組合：綜合營養片、蜂蜜卵磷脂、優質蛋白質</b><br>
                這是構建身體地基的三寶，建議作為每日定時補充的首選。
            </p>
        </div>

        <div id="analysis-list"></div>

        <div class="trust-box">
            <p style="font-size: 14px; line-height: 1.7; color: var(--dark-cocoa); margin: 0;">
                看完了數據，妳想看看更精準的全身拆解嗎？✨<br><br>
                我這裡有專業設備可以測體組成（體脂、肌肉、內臟脂肪），如果妳想徹底搞清楚自己的身體數據，<b>歡迎私訊我預約時間</b>，我會根據結果給妳 1 對 1 的飲食建議。<br><br>
                妳準備好開始改變了，就來找我吧！
            </p>
        </div>
        
        <a href="https://lin.ee/shwZmvq" target="_blank" class="btn-line">
            📲 私訊我預約，測量詳細數據
        </a>
        
        <span class="reset-link" onclick="location.reload()">重新進行評估</span>
    </div>
</div>

<script>
    const database = {
        "1": { prod: "長效型複合維生素 B 群", why: "協助能量轉換，改善早晨疲勞感。" },
        "2": { prod: "葉黃素、魚油精華", why: "保護黃斑部，緩解藍光造成的乾澀。" },
        "3": { prod: "濃縮蔬果精華", why: "補足植萃營養素，提升身體防禦力。" },
        "4": { prod: "螯合鈣鎂片", why: "安定神經與肌肉，找回高品質睡眠。" },
        "5": { prod: "複合益生菌、纖維粉", why: "優化腸道微生態，讓代謝更順暢。" },
        "6": { prod: "維生素 C、特定益生菌", why: "強化黏膜屏障，穩定免疫過度反應。" },
        "7": { prod: "葡萄糖胺、鈣鎂 D", why: "維持關節潤滑，強化骨骼支撐力。" },
        "8": { prod: "卵磷脂、銀杏萃取", why: "協助腦細胞傳導，維持思緒靈敏。" },
        "9": { prod: "卵磷脂、複合纖維", why: "協助油脂代謝，穩定體態管理。" },
        "10": { prod: "膠原蛋白、葉酸鐵", why: "增加含氧量與彈性，透出自然紅潤。" }
    };

    function goToResult() {
        const name = document.getElementById('user_name').value;
        const hValue = document.getElementById('height').value;
        const wValue = document.getElementById('weight').value;
        const habits = document.querySelectorAll('input[name="habit"]:checked');

        if(!name || !hValue || !wValue) { alert("請填寫完整資訊喔！"); return; }

        const h = hValue / 100;
        const w = wValue;
        const bmi = (w / (h * h)).toFixed(1);
        document.getElementById('bmi-res').innerHTML = `${name} 您好，您的 BMI 為 ${bmi}`;

        let listHtml = "";
        let emailData = "基礎建議：綜合營養片、卵磷脂、蛋白質\n\n加強建議：\n";
        
        habits.forEach(check => {
            const item = database[check.value];
            listHtml += `<div class="report-card"><b>➤ 針對性加強：${item.prod}</b><p style="font-size:13px; margin:5px 0 0; color:#6E5F55;"><b>分析：</b>${item.why}</p></div>`;
            emailData += `${item.prod}\n`;
        });
        document.getElementById('analysis-list').innerHTML = listHtml;

        // 🌟 記得填入妳的 Service ID 和 Template ID
        emailjs.send('Service_ID', 'Template_ID', { name: name, bmi: bmi, details: emailData });

        document.getElementById('page-1').style.display = 'none';
        const page2 = document.getElementById('page-2');
        page2.classList.remove('hidden');
        page2.classList.add('fade-in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
